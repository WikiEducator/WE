<script type="text/javascript">/*<![CDATA[*/
$(function() {
  $('.weYouTube').each(function() {
    var id = $(this).data('ytid');
    console.log('id', id);
    var img = $(this).data('img');
    if (!img) {
      // mark it as in flight
      $(this).data('img', '#');
      $.ajax({
        url: 'https://www.googleapis.com/youtube/v3/videos?id=' + id + '&key=AIzaSyAQtYcfsqifV0XF_tLADxUeyUdlgqY65Tg&part=snippet,status,contentDetails,player,statistics'
      }).done(function(d) {
        var $did, img;
        console.log(id, d);
        console.log(d.items);
        console.log(d.items[0]);
        if (d && d.items && d.items.length === 1 && d.items[0].status) {
          if (d.items[0].status.license === 'creativeCommon') {
            // find appropriate thumbnail
            if (d.items[0].snippet && d.items[0].snippet.thumbnails) {
              console.log('look for', d.items[0].id);
              $did = $('div[data-ytid="' + d.items[0].id + '"]');
              console.log('found', $did.length);
              img = d.items[0].snippet.thumbnails.high.url;
              $did.find('img').attr('src', img);
              if (d.items[0].snippet.title) {
                $did.find('span').html(d.items[0].snippet.title + '<br>Play on YouTube &#x25b6;');
              }
            }
          }
        }
      });
    }
  });
  /*
  var inIframe = false;
  $(window).focus();
  $('iframe').mouseenter(function() {
    inIframe = true;
  }).mouseleave(function () {
    inIframe = false;
  });
  $(window).blur(function () {
    if (inIframe) {
      console.log('go to YouTube');
      window.location = 'http://www.youtube.com/watch?v=oUGKqEkp-UI';
    }
  });
  */
});
/*]]>*/</script>
